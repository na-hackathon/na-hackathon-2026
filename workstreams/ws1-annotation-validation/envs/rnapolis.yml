# T2 annotator RNApolis — deps for the pinned rnapolis-py submodule (run via PYTHONPATH; see modules/annotate.nf).
name: ws1-rnapolis
channels:
  - conda-forge
dependencies:
  - python>=3.12
  - pip
  - pip:
      - appdirs
      - apricot-select
      - graphviz
      - mmcif
      - numpy
      - ordered-set
      - orjson
      - pandas
      - pulp
      - pycircstat2
      - requests
      - scikit-learn
      - scipy
      - shapely
      - tqdm
      - viennarna
